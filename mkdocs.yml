site_name: swclib
site_description: A Python library for processing and evaluating neuron morphology data in SWC format
site_author: Yang Zekang
site_url: https://yang-ze-kang.github.io/swclib/
repo_url: https://github.com/yang-ze-kang/swclib
repo_name: yang-ze-kang/swclib

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Installation: install.md
  - Quick Start: quickstart.md
  - Tutorial:
    - Loading SWC Data: tutorial/data.md
    - SWC ↔ Mask Conversion: tutorial/image.md
    - Reconstruction Metrics: tutorial/metrics.md
    - Whole-Brain Image I/O: tutorial/whole_brain.md
  - API Reference:
    - Data: api/data.md
    - Image: api/image.md
    - Metrics: api/metrics.md
    - Whole Brain: api/whole_brain.md